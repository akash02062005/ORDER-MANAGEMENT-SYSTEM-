spring.application.name=order-management
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/order_management}
server.port=8080

# Security
jwt.secret=${JWT_SECRET:5f4dcc3b5aa765d61d8327deb882cf99a184e88b}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OAuth2 removed — email-only authentication

# WebSocket
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
logging.level.org.springframework.security=INFO

# === Payment Gateway: Razorpay ===
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_ScsRomNTSfe2Wb}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:Rp2hjFMa2CquEIqQrQlW8l1i}
razorpay.webhook-secret=${RAZORPAY_WEBHOOK_SECRET:}

# === Email: Brevo API (preferred — 300/day free, no domain verification needed) ===
brevo.api-key=${BREVO_API_KEY:}
brevo.from-email=${BREVO_FROM_EMAIL:OrderStream <noreply@orderstream.local>}

# === Email: Resend API (fallback — only used if BREVO_API_KEY is unset) ===
resend.api-key=${RESEND_API_KEY:}
resend.from-email=${RESEND_FROM_EMAIL:OrderStream <onboarding@resend.dev>}

# === SaaS / App ===
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.magic-link-secret=${APP_MAGIC_LINK_SECRET:change-this-in-prod-please}
app.magic-link-ttl-minutes=15

# === Caching (Caffeine) for hot read endpoints ===
spring.cache.type=caffeine
spring.cache.cache-names=plans,userByUsername,dashboardStats
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s
